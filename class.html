<!DOCTYPE html>
<html lang="en">
<head>
  <title>Store</title>
  <style>
    body {
        margin: 10px;
        padding: 10px;
        font-family: Arial;
        background: white;
        text-align: center;
    }

    h1 {
        margin-top: 30px;
        font-size: 32px;
        color: black;
    }

    .products {
        width: 150px;
        max-width: 900px;
        margin: auto;
        display: grid;
        gap: 20px;
        padding: 30px 0;
    }

    .product{
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        transition: 0.3s ;
    }

    .product:hover {
        
        box-shadow: 0px 6px 18px rgba(0,0,0,0.2);
    }

    .productp {
        margin: 8px ;
        font-size: 18px;
        color: #444;
    }

    button {
        width: 150px;
        height: 45px;
        background: black;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 15px;
        transition: 0.1s;
        font-size: 16px;
    }

    button:hover {
        background: #333;
        
    }

  </style>
</head>

<body>
  <h1>Product List</h1>

  <div class="products">
    <div class="product">
        <p>991-MS</p>
        <p>Price - $30</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <p>Woolen Caps</p>
        <p>Price - $60</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <p>Boots</p>
        <p>Price - $80</p>
        <button>Add to Cart</button>
    </div>
  </div>

  <script src="H.js"></script>
</body>
</html>
