<!DOCTYPE html>
<html>
  <head>
    <style>
      .body{
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .fname{
        margin-top:20px;
        border-radius: 2px;
        border-color: gray;
        border-style: solid;
        margin-right: 20px;
        border-radius: 4px;
        width: 100px;
        color:gray;
        margin-bottom: 10px;
      }
      .lname{
        margin-top: 20px;
        border-radius: 4px;
        border-color: gray;
        width:100px;
        border-radius: 4px;
        color:gray;
        border-style: solid;
        margin-bottom: 10px;
      }
      .email{
        display: block;
        border-radius: 2px;
        width: 220px;
        border-color: gray;
        border-radius: 4px;
        color:gray;
      margin-bottom: 10px;
      border-style: solid;
      }
      .sign-in{
        margin-top: 10px;;
        border-radius:2px;
        color:white;
        background-color: rgb(44, 44, 219);
        display: block;
        width:220px;
        border: none;
        height: 30px;
      }
    </style>
  </head>
  <body>
    <input class="fname" type="text" placeholder="First Name" style="width: 100px; height: 40px;" >
    <input class="lname" type="text" placeholder="Last Name" style="width: 100px; height: 40px;">
    <input class="email" type="text" placeholder="Email" style="width: 210px; height: 40px;">
    <button class="sign-in">
      Sign Up
    </button>
  </body>
</html>
