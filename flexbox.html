<!DOCTYPE html>
<html>
  <head>
    <title>
      flexbox practice
    </title>
    <style>
      .flex1{
        margin-top:30px;
      }
      .flex{
        margin-top:30px;
      }
      .flex2{
        column-gap: 15px;
        margin-top: 30px;
        height:100px;
      }
    </style>
  </head>
  <body>
        <div class="flex1"style="display:flex;
    flex-direction: row;
    ">
      <div style="background-color: aqua;">div 1</div>
      <div style="background-color: lightcoral;">div 2<p>text</p></div>
    </div>


    <div  class="flex"style="display:flex;
    flex-direction: row;
    ">
      <div style="background-color: aqua;">100px</div>
      <div style="background-color: lightcoral;flex:1">flex:1</div>
    </div>


    <div class="flex" style="display:flex;
    flex-direction: row;
    ">
      <div style="background-color: aqua;">100px</div>
      <div style="background-color: lightcoral;flex:1">flex:1</div>
      <div style="background-color: aqua;flex:1">flex:2</div>
    </div>

    <div class="flex2" style="display:flex">
      <div style="background-color: aqua;flex:1">1fr</div>
      <div style="background-color: lightcoral;flex:1">1fr</div>
      <div style="background-color: aqua;flex:1">1fr</div>
    </div>
  </body>
</html>
