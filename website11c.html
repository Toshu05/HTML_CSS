<!DOCTYPE html>
<html>
  <head>
    <title>
      3rd grid program
    </title>
    <style>
    .column{
      column-gap: 15px;
      row-gap: 15px;
    }
    </style>
  </head>
  <body>
    <div class="column" style="display:grid; grid-template-columns: 1fr 1fr 1fr ;">

      <div style="background-color: lightcoral;">col2</div>
      <div style="background-color: lightcoral;">col2</div>
      <div style="background-color: lightcoral;">col2</div>
      <div style="background-color: lightcoral;">col2</div>
      <div style="background-color: lightcoral;">Col2</div>
      <div style="background-color: lightcoral;">Col2</div>"
    </div>
  </body>
</html>
