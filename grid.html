<!DOCTYPE html>
<html>
  <head>
    <title>
      Grid system
    </title>
    <style>

    </style>
  </head>
  <body>
    <div>
      <div style="
      margin-top: 25px;
        display:grid;
        grid-template-columns:100px 100px;">

         <div style="background-color: blue;"> div 01</div>
         <div style="background-color: aqua;">div 02</div>"

    </div>

    <div  style="
    margin-top:30px;
    display:grid;
    grid-template-columns:100px 200px 1fr;">

      <div style="background-color: blue;"> div 01</div>
      <div style="background-color: aqua;">div 02</div>
      <div style="background-color: blue;">div 03</div>

    </div>

    <div  style="
    margin-top:30px;
    display:grid;
    grid-template-columns:100px 1fr 1fr;">

      <div style="background-color: blue;"> div 01</div>
      <div style="background-color: aqua;">div 02</div>
      <div style="background-color: blue;">div 03</div>

    </div>
  </body>
</html>
